<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldCupStats</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>WorldCupStats</h1>
      <p>National-team analytics using StatsBomb Open Data.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Data status</h2>
      <p id="status">Loading competitions...</p>
    </section>

    <section class="card">
      <h2>National competitions/seasons</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Competition</th>
              <th>Season</th>
              <th>Gender</th>
              <th>Country</th>
              <th>Match available</th>
            </tr>
          </thead>
          <tbody id="competitions-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
