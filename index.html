<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldCupStats</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>WorldCupStats</h1>
      <p>National-team analytics using StatsBomb Open Data.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Filters</h2>

      <div class="filters-grid">
        <label>
          Competition
          <select id="competition-filter"></select>
        </label>

        <label>
          Season
          <select id="season-filter"></select>
        </label>

        <label>
          Team
          <select id="team-filter"></select>
        </label>

        <label>
          Last X games
          <select id="last-x-filter">
            <option value="all">All games</option>
            <option value="3">Last 3</option>
            <option value="5">Last 5</option>
            <option value="10">Last 10</option>
            <option value="20">Last 20</option>
          </select>
        </label>
      </div>

      <p id="status">Loading data...</p>
    </section>

    <section class="card">
      <h2>Average metrics</h2>
      <p id="summary"></p>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Metric</th>
              <th>Total</th>
              <th>Average per match</th>
            </tr>
          </thead>
          <tbody id="metrics-table-body"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Matches used in calculation</h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Competition</th>
              <th>Season</th>
              <th>Team</th>
              <th>Opponent</th>
              <th>Home/Away</th>
              <th>Goals</th>
              <th>Shots</th>
              <th>Passes</th>
              <th>Fouls</th>
            </tr>
          </thead>
          <tbody id="matches-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
