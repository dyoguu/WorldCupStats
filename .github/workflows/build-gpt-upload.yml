name: Build GPT Upload Files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write

jobs:
  build-gpt-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build GPT upload files directly from StatsBomb source
        run: python scripts/build_gpt_data.py

      - name: Commit updated GPT upload files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add gpt_upload/

          if git diff --cached --quiet; then
            echo "No GPT upload changes to commit."
          else
            git commit -m "Build GPT upload files"
            git push
          fi
